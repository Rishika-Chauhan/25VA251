<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Java Script Variables</h1>
    <script>
        //to define variable(container or storage in JS)
        var myName="ABES";
        document.write(myName);
        console.log(myName);
        //JS execution and scope(Global and Local)
        function demo(){
            var msg="Thanks";//local
            console.log(msg);
        }
        demo();
        //var declaratin using let and const
        let msg2="Thanks again";
        console.log(msg2);

        const msg3="Thanks to visit my page";
        console.log(msg3);
    </script>

</body>
</html>
