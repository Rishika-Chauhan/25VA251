<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function</title>
</head>
<body>
    <script>
        // function ... a javascript function is a rsuable block of code that performs a specific task. It can be defined once and called multiple times throughout the program.

        // normal function without parameter
        function demo(){
            console.log("Hello, World!");
        }
        demo();

        // function with parameter
        function name(a){
            console.log("Hello, " + a + "!");
        }
        name("Rishika");

        // function with default parameter
        function add(a,b=10){
            console.log("addition of two numbers is:" + (a + b));
        }
        add(3);

        // anonymous function...a function without a name. It is often used as a callback function or assigned to a variable. These functions are typically used in situations where a function is needed temporarily and does not require a name for reference.

        let cal=function(){
          var num1=5;
          var num2=10;
          var res=num1*num2;
            console.log("The multiplication of two numbers is: " + res);
        }
        cal();

        // arrow function... used in Es56 and later versions. It provides a more concise syntax for writing functions. Arrow functions are often used for shorter functions or when the function does not require its own 'this' context.

        let division=(num1,num2)=>{
            var num1=20;
            var num2=5;
            var res=num1/num2;
            console.log("The division of two numbers is: " + res);
        }
        division();
        // arrow function with single line statement

        let msg = () => console.log("Hello ABES");


        // calculator function
        let calculator=(a,b)=>{
            a= 15;
            b=5;
            console.log("The addition of two numbers is: "+ (a+b));
            console.log("The subtraction of two numbers is: "+ (a-b));
            console.log("The multiplication of two numbers is: "+ (a*b));
            console.log("The division of two numbers is: "+ (a/b));
        }
        calculator();  
        
        // callback funtion... a function that is passed as an argument to another function and is executed after a certain event or condition is met. 
        function subtract(){
            var num1=20;
            var num2=10;
            var res=num1-num2;
        }

        function displayRes(){
            console.log("the result is "+res)
        }
        subtract(displayRes);
        // callback using Set Timeout Api

        function msg1(){
            console.log("Hello friend");
        }
        setTimeout(msg1,2000);

        // IIFE-
        (function(a,b){
            console.log(`first parameter ${a} and 
            second parameter ${b}`);
            var res=a+b;
            console.log(`Result is ${res}`);
        })(5,10);

        // short code using arrow function 
        (msg=>console.log("Hello IIFE"))();

        // Promises... a promise is an object that represents the eventual completion (or failure) of an asynchronous operation and its resulting value. It allows you to handle asynchronous operations in a more manageable way, avoiding callback hell and providing a cleaner syntax for handling asynchronous code.  

        let promise= new Promise(function(resolve,reject){
            let a=25;
            if(a>=18){
                resolve("valid age");
            }
            else{
                reject("wait for some years");
            }
        });
        promise.then(msg=>console.log(msg)).catch(error=>console.log(error));
        // console.log(promise);

        // async await... a syntactic sugar built on top of promises that allows you to write asynchronous code in a more synchronous and readable manner. It provides a way to handle asynchronous operations using a more straightforward syntax, making it easier to understand and maintain.

        // error handling using try catch block

        try{
             async function serData(){
            let response= await fetch('https://api.github.com/users/Rishika-Chauhan');
            let responseData= await response.json();
            console.log(responseData);}
            // document.write(responseData.id);

        catch(error){

        // userData();

        // local storage... a web storage API that allows you to store data in the browser's local storage. It provides a way to store key-value pairs on the client-side, allowing data to persist even after the browser is closed.
        let myInfo={
            name:"Rishika",
            age:21,
            mobile:7895091841,
            Email:"chauhan.rishika2007@gmail.com",
        }
        // convert the object into string using stringify
        let myInfoData=JSON.stringify(myInfo);

        // set data in local storage
        localStorage.setItem("preference",myInfoData);

        // retrieving the data from local storage
       let getMyInfoData = localStorage.getItem("preference");

       const finalData = JSON.parse(getMyInfoData);
       console.log(finalData.name);

    //    High order function... a function that takes another function as an argument or returns a function as its result. Higher-order functions are a fundamental concept in functional programming and are used to create more flexible and reusable code.

    // map() filter() and reduce() forEach()

    // map()... a higher-order function that creates a new array by applying a provided function to each element of the original array. It does not modify the original array and returns a new array with the transformed values.

    // reduce()... a higher-order function that applies a provided function against an accumulator and each element in the array (from left to right) to reduce it to a single value. It takes two arguments: a callback function and an optional initial value for the accumulator.

    // filter()... a higher-order function that creates a new array with all elements that pass the test implemented by the provided function. It does not modify the original array and returns a new array with the elements that satisfy the condition specified in the callback function.
    
    // forEach()... a higher-order function that executes a provided function once for each array element. It does not return a new array and is typically used for performing side effects, such as logging or modifying external variables.

        let num=[1,2,3,4,5,6,7,8,9,1,2,3,45,6,6,7,];

        // find the square of the num

        let result=num.map(n=>n*n);
        console.log(`square of the num is ${result}`);

        // find the number greater than 3

        let result1=num.filter(n=>n>3);
        console.log(`the number greater than 3 is ${result1}`);

        // find the sum of all the numbers
        let result2=num.reduce((total,n)=>total+n,0);
        console.log(`addition of the numbers is ${result2}`);

        // find multiply of 2 of each element in the array
        num.forEach(n)=console.log(n*2);
    </script>
